<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Smart Route HK</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <h1>Tesla Route Planner</h1>
    </header>

    <main class="content">
        <section class="card shadow-sm">
            <div class="card-header">
                <span class="material-icons">place</span>
                <label>行程節點 (Nodes)</label>
            </div>
            <div id="nodes-container">
                <div class="input-group">
                    <input class="node-input" placeholder="由哪裡出發？" autocomplete="off">
                    <span class="clear-btn" onclick="removeNode(this)">✕</span>
                </div>
                <div class="input-group">
                    <input class="node-input" placeholder="目的地在哪？" autocomplete="off">
                    <span class="clear-btn" onclick="removeNode(this)">✕</span>
                </div>
            </div>
            <div class="action-row">
                <button class="secondary-btn" onclick="addNode()"><span class="material-icons">add</span> 中途站</button>
                <button class="secondary-btn" id="retBtn" onclick="toggleReturn()"><span class="material-icons">sync</span> 往返</button>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <span class="material-icons">settings</span>
                <label>偏好設定 (Settings)</label>
            </div>
            <div class="setting-item">
                <span>出發時間</span>
                <input type="time" id="start-time" onchange="calculate()">
            </div>
            <div class="setting-item">
                <span>充電方式</span>
                <select id="car-model" onchange="calculate()">
                    <option value="0.160|3.85">Tesla Supercharger 繁忙</option>
                    <option value="0.160|2.10">Tesla Supercharger 非繁忙</option>
                    <option value="0.160|1.34">中電 EV 住宅高峰</option>
                    <option value="0.160|0.91">中電 EV 住宅非高峰</option>
                    <option value="0.180|0">免費充電站</option>
                </select>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <span class="material-icons">directions_car</span>
                <label>隧道選擇 (去程)</label>
            </div>
            <div class="tunnel-grid" id="goTunnels"></div>
            
            <div id="backTunnelSection" class="hidden">
                <hr class="divider">
                <label>隧道選擇 (回程)</label>
                <div class="tunnel-grid" id="backTunnels"></div>
            </div>
        </section>

        <div id="map" class="map-view"></div>

        <section class="stats-grid">
            <div class="stat-card"><span>里程</span><b id="km">0.0 km</b></div>
            <div class="stat-card"><span>時間</span><b id="duration">0 min</b></div>
            <div class="stat-card"><span>隧道</span><b id="t-fee">$0</b></div>
            <div class="stat-card"><span>充電</span><b id="e-cost">$0</b></div>
        </section>
        
        <div style="height: 120px;"></div>
    </main>

    <footer class="bottom-nav">
        <div class="nav-content">
            <div class="total-price">
                <small>總預算</small>
                <div class="price-val">HK$ <span id="total">0.0</span></div>
            </div>
            <button class="primary-btn" onclick="calculate()">更新預算</button>
        </div>
    </footer>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&libraries=places&callback=initApp" async defer></script>
<script src="app.js"></script>
</body>
</html>
